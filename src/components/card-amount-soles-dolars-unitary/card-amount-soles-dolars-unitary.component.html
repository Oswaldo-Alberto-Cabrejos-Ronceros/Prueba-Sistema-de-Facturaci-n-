<div class="w-full flex flex-col gap-4 px-4 pt-4 pb-2">
  <!-- titulo con icon -->
  <div class="flex gap-2 items-center">
    <app-icon [iconName]="iconName" [ariaLabel]="title"></app-icon>
    <h3 class="text-xl font-semibold">
      {{title}}
    </h3>
  </div>
  <p class="text-neutral-500" *ngIf="data.length===0">
    {{emptyMessage}}
  </p>
  <!-- contenido -->
  <div *ngIf="data.length>0" class="grid grid-cols-2 gap-4">
    <!-- soles -->
    <div>
      <p class="text-neutral-500">
        En soles
      </p>
      <!-- tabla -->
      <table>
        <tr *ngFor="let item of data">
          <td class="text-xl font-medium">
            S/ {{item.soles}}
          </td>
          <td class="pl-2" *ngIf="item.subtitle">
            en {{item.subtitle.toLowerCase()}}
          </td>
        </tr>
      </table>
    </div>
    <!-- dolares -->
    <div>
      <p class="text-neutral-500">
        En soles
      </p>
      <!-- tabla -->
      <table>
        <tr *ngFor="let item of data">
          <td class="text-xl font-medium">
            S/ {{item.soles}}
          </td>
          <td class="pl-2" *ngIf="item.subtitle">
            en {{item.subtitle.toLowerCase()}}
          </td>
        </tr>
      </table>
    </div>
  </div>
</div>
