<button
  class="h-10 min-w-max rounded-xl flex items-center justify-center transition-colors duration-300 bg-neutral-100 dark:bg-neutral-700 hover:bg-neutral-200 dark:hover:dark:bg-neutral-600 cursor-pointer" [ngClass]="size==='sm'?'w-10':'py-4 px-3'"><app-icon
    [ariaLabel]="ariaLabel" [size]="size==='sm'?'text-xl':''" [iconName]="iconName"></app-icon>
  <span *ngIf="label" class="text-base font-bold text-left px-2">
    {{label}}
  </span>
</button>
