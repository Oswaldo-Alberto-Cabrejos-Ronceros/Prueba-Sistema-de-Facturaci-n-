<button
  class="h-10 rounded-xl flex items-center justify-center transition-colors duration-300 bg-neutral-200 dark:bg-neutral-800 hover:bg-neutral-300 dark:hover:dark:bg-neutral-700 py-4 px-3 cursor-pointer"><app-icon
    [ariaLabel]="ariaLabel" [iconName]="iconName"></app-icon>
  <span *ngIf="label" class=" text-base font-bold text-left px-2">
    {{label}}
  </span>
</button>
