<!-- header -->
<div class="w-full flex items-start justify-between gap-4">
  <h3 class="text-lg font-black">{{ title }}</h3>
  <app-button-icon
    ariaLabel="Cerrar"
    iconName="close"
    (click)="onClose()"
  ></app-button-icon>
</div>
<!-- contenido -->
<div class="flex-1 overflow-y-auto max-h-full">
  <ng-content></ng-content>
</div>
<!-- footer -->
<div class="w-full flex items-center justify-end gap-2">
  <!-- boton cancelar -->
  <app-button-icon-label-terciary
    label="Cancelar"
    (click)="onClose()"
  ></app-button-icon-label-terciary>
  <!-- boton guardar -->
  <app-button-icon-label-quaternary
    label="Guardar"
  ></app-button-icon-label-quaternary>
</div>
