<select [name]="name" [id]="name" [(ngModel)]="value"
  class="w-full transition-colors duration-150 bg-neutral-100 focus:outline-none py-2 px-3 dark:bg-neutral-600 rounded-xl placeholder:font-medium placeholder:text-neutral-400"
  [ngClass]="size==='sm'?'text-sm':(size==='xs'?'text-xs':'text-base h-12')">
  <option *ngFor="let option of options" [value]="option.value">{{option.label}}</option>
</select>
