<select [name]="name" [id]="name" [(ngModel)]="value"
  class="w-full transition-colors duration-150 bg-neutral-100 dark:bg-neutral-600 py-2 px-3 rounded-xl focus:bg-white placeholder:font-medium placeholder:text-neutral-400"
  [ngClass]="size==='sm'?'text-sm':(size==='xs'?'text-xs':'text-base')">
  <option *ngFor="let option of options" [value]="option.value">{{option.label}}</option>
</select>
