 <app-pop-up-card [visible]="visible" [trigger]="trigger">
    <nav class="w-full flex flex-col ">
    <!-- items -->
    <div *ngFor="let option of options"
      class="w-full flex items-center px-8 py-3 justify-start transition-colors duration-150 hover:bg-neutral-200 dark:hover:dark:bg-neutral-700 cursor-pointer">
      <p class="text-base">
        {{option.title}}
      </p>
    </div>
  </nav>
 </app-pop-up-card>
