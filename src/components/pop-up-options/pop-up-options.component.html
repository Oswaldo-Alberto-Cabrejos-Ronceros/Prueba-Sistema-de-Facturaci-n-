<app-pop-up-card [visible]="visible" [trigger]="trigger" [size]="size">
  <nav class="w-full flex flex-col ">
    <!-- items -->
    <div *ngFor="let option of options"
      class="w-full flex items-center gap-1 text-base justify-start transition-colors duration-150 hover:bg-neutral-200 dark:hover:dark:bg-neutral-700 cursor-pointer"
      [ngClass]="size==='sm'?' text-sm px-4':'py-3 text-base px-7'">
      <span class="material-symbols-rounded p-0 size-min text-xl!" [ariaLabel]="option.title">
        {{option.iconName}}
      </span>
      <p>
        {{option.title}}
      </p>
    </div>
    <app-empty-card *ngIf="!options.length" message="No hay notificaciones"></app-empty-card>
  </nav>
</app-pop-up-card>
