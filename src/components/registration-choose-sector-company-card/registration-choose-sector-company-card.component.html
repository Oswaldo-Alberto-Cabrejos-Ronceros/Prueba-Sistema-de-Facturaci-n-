<div class="w-full flex flex-col items-start gap-4 text-neutral-900">
  <h2 class="text-4xl font-bold pb-6">Elige el rubro de tu empresa</h2>
  <p class="text-base">Si te equivocas podrás cambiar de rubro más adelante</p>
</div>
<form class="w-full grid grid-cols-2 gap-4">
  <app-select-card *ngFor=" let opcion of opciones" [label]="opcion.label" [name]="opcion.name"
    [imgUrl]="opcion.imgUrl"></app-select-card>
  <app-button-primary
    class="col-span-2"
    nombre="Registrarse"
  ></app-button-primary>
</form>
