<label class="relative">
  <input type="checkbox" [name]="name" class="peer hidden" />
     <div class="rounded-full size-6 border-1 transition-colors duration-150 border-neutral-900 dark:border-neutral-50 absolute top-0 right-0 mt-4 mr-4 peer-checked:bg-green-400 z-20 material-symbols-rounded text-transparent peer-checked:text-green-800">
      check
    </div>
  <div class="bg-transparent relative rounded-4xl flex-1 flex flex-col items-center  p-6 gap-4 transition-shadow duration-300 inset-ring-1 hover:inset-ring-2 peer-checked:inset-ring-3 cursor-pointer">

    <h3 class="text-lg text-neutral-90 font-semibold">{{ label }}</h3>
  <img [src]="imgUrl" alt="opción" class="w-full h-full object-cover" />
  </div>
</label>
