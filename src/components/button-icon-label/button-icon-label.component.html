<button class="h-full w-full flex gap-2 items-center justify-center rounded-2xl p-5 max-w-lg min-w-min transition-colors duration-150 hover:bg-neutral-200 dark:hover:dark:bg-neutral-700 cursor-pointer" [ngClass]="border?'border border-neutral-200 dark:border-neutral-700':''">
 <app-icon [ariaLabel]="name" [iconName]="iconName"></app-icon>
  <span class="  font-semibold text-neutral-900 dark:text-neutral-50" [ngClass]="size==='base'?'text-base':'text-sm'">
    {{name}}
  </span>
</button>
