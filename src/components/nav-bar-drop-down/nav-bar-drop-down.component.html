<div class="flex flex-col gap-4 relative">
  <!-- button -->
  <button (click)="handleVisible()" #buttonRef type="button"
    class="p-4 flex items-center justify-between gap-2 cursor-pointer">
    <p class="text-lg font-extrabold">{{options[optionSelected].title}}</p>
    <app-icon ariaLabel="Desplegar" iconName="keyboard_arrow_down" class="transition-transform duration-150"
      [class.rotate-180]="visible"></app-icon>
  </button>
  <!-- opciones -->

  <div class="absolute top-15 z-50 bg-white min-w-min dark:bg-neutral-800 flex flex-col rounded-xl gap-2 shadow-uniform py-4
          opacity-0 origin-top scale-y-0 transition-opacity-transform duration-200 ease-out"
    [class.opacity-100]="visible" [class.scale-y-100]="visible" #cardOptionsRef>
    <nav class="w-full flex flex-col ">
      <!-- items -->
      <div *ngFor="let option of options " (click)="handleVisible()" [routerLink]="option.to"
        [routerLinkActiveOptions]="{ exact: true }" routerLinkActive="text-neutral-900 dark:text-neutral-100"
        #rla="routerLinkActive"
        class="w-full flex text-neutral-500 items-center px-7 py-3 transition-colors duration-150 gap-2 justify-between hover:bg-neutral-200 dark:hover:dark:bg-neutral-700 cursor-pointer">
        <p class="text-base font-bold">
          {{option.title}}
        </p>
        <span class="material-symbols-rounded p-0 size-min" aria-label="ariaLabel"
          [ngClass]="{ 'text-red-600': rla.isActive, 'text-transparent': !rla.isActive }">
          check
        </span>
      </div>
    </nav>
  </div>
</div>
