<!-- principal -->
<div class="w-full py-0.5 flex gap-4 items-center">
<!-- icon -->
   <span class="material-symbols-rounded text-4xl! p-0 size-min" [ariaLabel]="title">
    {{iconName}}
  </span>
  <!-- titulo y contenido -->
   <div class="flex flex-1 flex-col justify-between gap-0.5">
    <p class="text-base font-bold">{{title}}</p>
    <p class="text-sm"> {{content}} </p>
   </div>
</div>
