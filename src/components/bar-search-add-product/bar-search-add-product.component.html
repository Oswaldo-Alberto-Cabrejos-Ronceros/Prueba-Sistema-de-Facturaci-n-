<div class="w-full min-w-xs bg-neutral-100 flex rounded-2xl overflow-hidden text-sm"[ngClass]="size==='sm'?'h-auto':'h-12'">
  <!-- inputs y select -->
  <div class="flex-1">

    <input type="text" placeholder="Buscar producto"
      class="rounded-l-2xl h-full focus:bg-white placeholder:font-medium placeholder:text-neutral-400  border-x border-neutral-300 dark:border-neutral-50"
      [ngClass]="[!withIGV && !withPriceUnitary?'w-[82%]':'w-[65%]',size==='sm'?'text-sm py-1 px-2':'text-base py-3 px-4 font-semibold']" />
    <input type="number" placeholder="Cantidad"
      class=" h-full py-1 px-2 focus:bg-white placeholder:font-medium placeholder:text-neutral-400  border-r border-neutral-300 dark:border-neutral-50"
      [ngClass]="[withIGV && withPriceUnitary?'w-[12%]':withIGV && !withPriceUnitary?'w-[18%]':!withIGV && withPriceUnitary?'w-[18%]':'w-[18%]',size==='sm'?'text-sm py-1 px-2':'text-base py-3 px-4 font-semibold']"/>
    <select *ngIf="withIGV"
      class="h-full py-1 px-2 placeholder:font-medium placeholder:text-neutral-400  border-x border-neutral-300 dark:border-neutral-50"
      [ngClass]="[withIGV && !withPriceUnitary?'w-[17%]':'w-[11%]',size==='sm'?'text-sm py-1 px-2':'text-base py-3 px-4 font-semibold']"
      >
      <option value="1">Incluye IGV</option>
      <option value="2">No incluye IGV</option>
    </select>
    <input *ngIf="withPriceUnitary" type="number" placeholder="Precio"
      class="h-full py-1 px-2 focus:bg-white placeholder:font-medium placeholder:text-neutral-400  border-r border-neutral-300 dark:border-neutral-50"
       [ngClass]="[!withIGV && withPriceUnitary?'w-[17%]':'w-[12%]',size==='sm'?'text-sm py-1 px-2':'text-base py-3 px-4 font-semibold']"
      />

  </div>
  <app-button-square iconName="add" [size]="size==='sm'?'sm':'base'" [active]="true"></app-button-square>
</div>
