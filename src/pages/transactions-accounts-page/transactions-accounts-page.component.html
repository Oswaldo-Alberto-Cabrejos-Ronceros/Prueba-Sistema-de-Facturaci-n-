<!-- contenido inyectado -->
<ng-template #customRightTemplate>
  <app-button-icon-label-quaternary ariaLabel="Nueva cuenta" (click)="openModal()" iconName="add"></app-button-icon-label-quaternary>
</ng-template>

<app-table-filter-secondary [columns]="columns" [data]="cuentas">
  <ng-template #row let-cuenta let-i="index">
    <td class="py-2 px-2.5">
      {{cuenta.name}}
    </td>
    <td class="py-2 px-2.5 flex items-center justify-center gap-2">
      <app-button-icon-terciary iconName="edit" ariaLabel="Editar"></app-button-icon-terciary>
      <app-button-icon-terciary (click)="handlePopUpExport(i)" #trigger iconName="more_horiz"
        ariaLabel="Opciones"></app-button-icon-terciary>
      <app-pop-up-options size="sm" [options]="optionsExport" *ngIf="activePopUpIndex === i"
        [trigger]="trigger.elementRef" [visible]="activePopUpIndex === i">></app-pop-up-options>
    </td>
  </ng-template>
</app-table-filter-secondary>

<!-- modal -->

<app-shared-modal [typeConfirm]="true" [show]="showModal" (close)="closeModal()">
  <app-card-save-secondary title="Nueva transacción" (close)="closeModal()">
    <div class="w-full flex flex-col gap-4 text-sm">
      <!-- cuenta -->
      <div class="w-full justify-between flex">
        <p class="text-sm">Cuenta</p>
        <div class="w-84"><app-select-secondary [options]="optionsType" size="sm"></app-select-secondary></div>
      </div>

      <!-- numero de cuenta -->
      <div class="w-full justify-between flex">
        <p class="text-sm">Nombre de cuenta</p>
        <div class="w-84"><app-input-secondary size="sm" placeholder="Nombre de cuenta"></app-input-secondary></div>
      </div>

      <!-- moneda -->
      <div class="w-full justify-between flex">
        <p class="text-sm">Moneda</p>
        <div class="w-84"><app-select-secondary [options]="optionsExchange" size="sm"></app-select-secondary></div>
      </div>

      <!-- id de cuenta -->
      <div class="w-full justify-between flex">
        <p class="text-sm">Id de cuenta</p>
        <div class="w-84"><app-input-secondary size="sm" placeholder="Id de cuenta"></app-input-secondary></div>
      </div>

      <!-- descripcion -->

      <div class="w-full justify-between flex">
        <p class="text-sm">Descripción</p>
        <div class="w-84 flex">
          <app-text-area-secondary size="sm" [rows]="3" placeholder="Descripción"></app-text-area-secondary>
        </div>
      </div>

    </div>
  </app-card-save-secondary>

</app-shared-modal>
