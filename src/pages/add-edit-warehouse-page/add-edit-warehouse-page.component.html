<!-- contenido inyectado a nav-bar-menu -->
<ng-template #customRightTemplate>
</ng-template>
<div class="w-full flex min-h-full flex-col md:flex-row ">
  <!-- seccion productos -->
  <div class="md:border-r pt-5 border-neutral-300 dark:border-neutral-50 md:w-3/5 lg:w-2/3 sm:pr-9">
    <app-empty-card [large]="true" message="No hay productos"></app-empty-card>
  </div>
  <!-- seccion 2 -->
  <div class="md:w-2/5 lg:w-1/3">

    <!-- seccion 1 -->
    <div class="w-full py-5 md:pl-5 pr-0 ">
      <app-select-input-set-terciary nameSelect="type" [options]="optionsTypeOperation" nameInput="date"
        placeholderInput="Fecha" typeInput="date"></app-select-input-set-terciary>
      <p class="font-medium text-sm mt-4 mb-1.5">Observaciones</p>
      <app-text-area-terciary [rows]="3" [resize]="false"></app-text-area-terciary>
    </div>

    <!-- separador -->

    <hr class="md:-mr-5 lg:-mr-10 border-neutral-300">

    <div class="w-full py-5 md:pl-5 pr-0">
      <h3 class="font-bold">Guia</h3>
      <!-- select y input de tipo de guia -->
      <app-select-input-set-terciary nameSelect="typeGuide" [options]="optionsGuide" nameInput="number"
        placeholderInput="Número" typeInput="number"></app-select-input-set-terciary>
      <p class="font-medium text-sm mt-4 mb-1.5">Remitente</p>
      <!-- buscador -->
      <app-input-search></app-input-search>
      <!-- boton agregar remitente -->
      <div class="flex justify-end my-3"><app-button-add-underline iconName="person_add"
          label="Agregar Remitente"></app-button-add-underline></div>
          <!-- select motivo de transaldo -->
      <p class="font-medium text-sm mt-4 mb-1.5">Motivo de translado</p>
      <app-select-terciary name="trasfer" [options]="optionsReasonsTrasfer" size="sm"></app-select-terciary>
      <!-- input de punto de salida -->
      <p class="font-medium text-sm mt-4 mb-1.5">Punto de partida</p>
      <app-input-terciary name="startingPoint"></app-input-terciary>
      <!-- input punto de llegada -->
      <p class="font-medium text-sm mt-4 mb-1.5">Punto de llegada</p>
      <app-input-terciary name="arrivalPoint"></app-input-terciary>
      <!-- input double de datos de transporte -->
       <p class="font-medium text-sm mt-4 mb-1.5">Datos de transporte</p>
<app-input-double-terciary nameFirst="licensePlate" placeholderFirst="Placa" nameFirst="brand" placeholderSecond="Marca"></app-input-double-terciary>
    </div>

  </div>
</div>
