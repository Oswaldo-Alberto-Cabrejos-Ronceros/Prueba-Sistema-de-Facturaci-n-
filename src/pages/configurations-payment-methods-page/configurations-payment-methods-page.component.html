<!-- contenido inyectado -->
<ng-template #customRightTemplate>
  <app-button-icon-label-quaternary ariaLabel="Nueva cuenta" (click)="openModal()" iconName="add"></app-button-icon-label-quaternary>
</ng-template>

<!-- table -->

<app-table-filter-secondary [columns]="columns" [data]="paymentMethods">
  <ng-template #row let-paymentMethods let-i="index">
    <td class="py-2 px-2.5 text-center cursor-grabbing">
      <!-- icono -->
      <span class="material-symbols-rounded text-base! size-full">
        drag_pan
      </span>
    </td>
    <td class="py-2 px-2.5 text-center">
      {{paymentMethods.order}}
    </td>
    <td class="py-2 px-2.5 text-center">
      {{paymentMethods.name}}
    </td>
    <td class="py-2 px-2.5 ">
      <div class="size-full flex justify-center">
        <app-button-icon-terciary iconName="delete"></app-button-icon-terciary>
      </div>
    </td>
  </ng-template>
</app-table-filter-secondary>

<!-- modal -->

<app-shared-modal [typeConfirm]="true" [show]="showModal" (close)="closeModal()">
  <app-card-save-secondary title="Nueva método de pago" (close)="closeModal()">
    <!-- metodo de pago -->
    <div class="w-full justify-between flex">
      <p class="text-sm">Nombre</p>
      <div class="w-84"><app-input-secondary size="sm" placeholder="Nombre de categoria"></app-input-secondary></div>
    </div>
  </app-card-save-secondary>
</app-shared-modal>
