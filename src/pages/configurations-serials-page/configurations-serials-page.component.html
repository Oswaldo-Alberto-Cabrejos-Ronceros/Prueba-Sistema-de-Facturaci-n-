<!-- contenido inyectado -->
<ng-template #customRightTemplate>
  <app-button-icon-label-quaternary ariaLabel="Nueva cuenta" (click)="openModal()" iconName="add"></app-button-icon-label-quaternary>
</ng-template>

<!-- table -->
<app-table-filter-secondary [columns]="columns" [data]="serials">
<ng-template #row let-serial let-i="index">
      <td class="py-2 px-2.5 text-center">
      {{serial.name}}
    </td>
          <td class="py-2 px-2.5 text-center">
      {{serial.correlative}}
    </td>
              <td class="py-2 px-2.5 text-center">
      {{serial.typeDocument}}
    </td>
                  <td class="py-2 px-2.5 text-center">
      {{serial.description}}
    </td>
        <td class="py-2 px-2.5 ">
      <div class="size-full flex justify-center">
        <app-switch-primary [value]="serial.active"></app-switch-primary>
      </div>
    </td>
</ng-template>
</app-table-filter-secondary>

<!-- modal -->
<app-shared-modal [typeConfirm]="true" [show]="showModal" (close)="closeModal()">
  <app-card-save-secondary title="Nueva serie" (close)="closeModal()">
    <div class="w-full flex flex-col gap-2 text-sm">
      <!-- tipo documento -->
   <div class="w-full justify-between flex">
      <p>Tipo documento</p>
      <div class="w-84"><app-select-secondary [options]="optionsTypeDocument" size="sm"></app-select-secondary></div>
     </div>
     <!-- serie -->
     <div class="w-full justify-between flex">
      <p class="text-sm">Serie</p>
      <div class="w-84"><app-input-secondary size="sm" placeholder="Serie"></app-input-secondary></div>
     </div>
     <!-- descripcion -->
           <div class="w-full justify-between flex">
      <p class="text-sm">Descripción</p>
      <div class="w-84"><app-input-secondary size="sm" placeholder="Descripción"></app-input-secondary></div>
     </div>
    </div>
  </app-card-save-secondary>
</app-shared-modal>
