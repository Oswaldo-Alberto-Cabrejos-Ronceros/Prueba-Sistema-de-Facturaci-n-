<app-menu-principal-layout
  [hidden]="!isSmallMenuOpen()"
  class="fixed z-50 bg-white lg:hidden">
</app-menu-principal-layout>

<!-- Menu principal permanente en pantallas grandes -->
<app-menu-principal-layout
  class="relative z-0 hidden lg:block">
</app-menu-principal-layout>
<div class="flex-1 flex flex-col">
  <app-menu-header (open)="handleSmallMenu()" class="block lg:hidden"></app-menu-header>
  <app-trial-month-card></app-trial-month-card>
  <div
  class="fixed h-screen w-screen z-40 bg-black/40 lg:hidden"
  [hidden]="!isSmallMenuOpen()"
  (click)="handleSmallMenu()">
</div>
</div>
